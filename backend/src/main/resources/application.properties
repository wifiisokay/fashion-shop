spring.application.name=fashion-shop
server.port=8081
spring.config.import=optional:file:.env[.properties]

# ================= SSL =================
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=fashionshop

# ================= App =================
app.frontend-url=${FRONTEND_URL:https://localhost:5173}

# ========================
# Database — Aiven MySQL
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================
# JWT — HttpOnly Cookie
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Cookie name và settings
jwt.cookie.name=access_token
jwt.cookie.http-only=true
jwt.cookie.secure=false
jwt.cookie.same-site=Strict
jwt.cookie.path=/api

# Forgot password token TTL (minutes)
auth.reset-token-expiration-minutes=${AUTH_RESET_TOKEN_EXPIRATION_MINUTES:15}
auth.reset-password-url-base=${AUTH_RESET_PASSWORD_URL_BASE:http://localhost:5173/reset-password}

# Rate limit (critical auth endpoints)
security.rate-limit.login.max-requests=${RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
security.rate-limit.login.window-seconds=${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
security.rate-limit.register.max-requests=${RATE_LIMIT_REGISTER_MAX_REQUESTS:5}
security.rate-limit.register.window-seconds=${RATE_LIMIT_REGISTER_WINDOW_SECONDS:60}
security.rate-limit.forgot-password.max-requests=${RATE_LIMIT_FORGOT_PASSWORD_MAX_REQUESTS:5}
security.rate-limit.forgot-password.window-seconds=${RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:900}
security.rate-limit.reset-password.max-requests=${RATE_LIMIT_RESET_PASSWORD_MAX_REQUESTS:10}
security.rate-limit.reset-password.window-seconds=${RATE_LIMIT_RESET_PASSWORD_WINDOW_SECONDS:900}

# Mail (Forgot Password)
auth.mail.enabled=${AUTH_MAIL_ENABLED:true}
auth.mail.from=${EMAIL_USERNAME}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# Cloudinary
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.secure=true

# ========================
# GHN Shipping
# ========================
ghn.token=${GHN_TOKEN}
ghn.shop-id=${GHN_SHOP_ID}
ghn.base-url=${GHN_BASE_URL:https://dev-online-gateway.ghn.vn/shiip/public-api}



# Default package dimensions for fee calculation
ghn.defaults.weight=500
ghn.defaults.length=30
ghn.defaults.width=20
ghn.defaults.height=10

# Fallback values when GHN API fails
ghn.fallback.fee=30000
ghn.fallback.days=3

# Cache TTL
ghn.cache.ttl-minutes=5
ghn.cache.max-size=500

# ========================
# VNPay
# ========================
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL}

# ========================
# Gemini AI
# ========================
ai.primary=${AI_PRIMARY:gemini}
ai.fallback=${AI_FALLBACK:ollama-gemma}
gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:800}
gemini.temperature=${GEMINI_TEMPERATURE:0.7}
gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:10}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:gemma3:4b}
ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:30}

# ========================
# File Upload
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# ========================
# Springdoc / Swagger
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
